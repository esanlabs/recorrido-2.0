<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Tour ESAN 360 - Experiencia VR Premium</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script
        src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <style> 
        #pantalla-carga {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #E3173E, #E3173E);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: opacity 1s ease, transform 1s ease;
        }

        .oculto {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        #btn-menu-2d {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid #00BFFF;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
        }

        #btn-menu-2d:hover {
            background-color: #E3173E;
            color: #000;
            scale: 1.05;
        }

        #btn-capturar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #E3173E;
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #btn-capturar:hover {
            background-color: #00BFFF;
        }

        .a-enter-vr #btn-menu-2d,
        .a-enter-vr #btn-capturar {
            display: none;
        }
        #dbg-panel {
            position: fixed; bottom: 12px; left: 12px;
            background: rgba(0,0,0,0.75); color: #00FF88;
            font-family: monospace; font-size: 13px;
            padding: 8px 12px; border-radius: 6px;
            z-index: 9999; pointer-events: none;
            display: none; line-height: 1.7;
        }
        #dbg-panel.on { display: block; }
        #dbg-btn {
            position: fixed; bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.75); color: #00FF88;
            font-family: monospace; font-size: 12px;
            padding: 6px 12px; border-radius: 6px;
            z-index: 9999; cursor: pointer;
            border: 1px solid #00FF88;
        }

        /* ── 2D Info Card ── */
        :root {
            --esan-red: #E3173E;
            --radius-card: 18px;
            --shadow-card: 0 24px 64px rgba(0,0,0,0.45);
        }
        #card-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity .25s ease;
        }
        #card-backdrop.visible { opacity: 1; pointer-events: all; }
        #info-card-2d {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -44%) scale(0.94);
            width: min(420px, 92vw);
            background: #fff;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            z-index: 2001;
            opacity: 0; pointer-events: none;
            transition: opacity .28s ease, transform .28s cubic-bezier(.34,1.56,.64,1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info-card-2d.visible {
            opacity: 1; pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }
        .ic-img-wrap {
            position: relative;
            width: 100%; height: 180px;
            overflow: hidden;
            background: linear-gradient(135deg, #E3173E 0%, #7a0020 100%);
        }
        .ic-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            display: block;
            filter: brightness(0.80);
        }
        .ic-close {
            position: absolute; top: 12px; right: 12px;
            width: 34px; height: 34px;
            background: rgba(0,0,0,0.55);
            border: none; border-radius: 50%;
            color: #fff; font-size: 18px; line-height: 1;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background .18s;
            z-index: 10;
        }
        .ic-close:hover { background: var(--esan-red); }
        .ic-body { padding: 20px 24px 26px; }
        .ic-scene-tag {
            display: inline-block;
            background: #fde8ec; color: var(--esan-red);
            font-size: 10px; font-weight: 700;
            letter-spacing: 1.2px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 12px;
        }
        .ic-title {
            font-size: 17px; font-weight: 700;
            color: var(--esan-red);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin: 0 0 12px; line-height: 1.3;
        }
        .ic-divider {
            height: 3px;
            background: linear-gradient(90deg, var(--esan-red) 0%, transparent 100%);
            border-radius: 2px; margin-bottom: 14px;
        }
        .ic-desc {
            font-size: 13.5px; color: #696A6D;
            line-height: 1.65; margin: 0;
        }
    </style>

    <script>
        // ========================================================
        // COMPONENTE THREE.JS: CUBOS VIVOS (ROJO, CELESTE, BLANCO)
        // ========================================================
        AFRAME.registerComponent('cubos-digitales', {
          init: function () {
            const scene3D = this.el.sceneEl.object3D;
            this.count = 1000;
            
            this.geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(this.count * 3);
            const colors = new Float32Array(this.count * 3);
            
            const colorRojo = new THREE.Color(0xff0026);    
            const colorCeleste = new THREE.Color(0x00bfff); 
            const colorBlanco = new THREE.Color(0xffffff);  
            
            this.velocities = [];

          loopParticulas:
            for (let i = 0; i < this.count; i++) {
              positions[i * 3] = (Math.random() - 0.5) * 50;
              positions[i * 3 + 1] = (Math.random() - 0.5) * 40 + 1.6; 
              positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
              
              const rand = Math.random();
              let selectedColor;
              if (rand < 0.33) {
                selectedColor = colorRojo;
              } else if (rand < 0.66) {
                selectedColor = colorCeleste;
              } else {
                selectedColor = colorBlanco;
              }
              
              colors[i * 3] = selectedColor.r;
              colors[i * 3 + 1] = selectedColor.g;
              colors[i * 3 + 2] = selectedColor.b;

              this.velocities.push((Math.random() - 0.5) * 0.02); 
              this.velocities.push((Math.random() - 0.5) * 0.02); 
              this.velocities.push((Math.random() - 0.5) * 0.02); 
            }
            
            this.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            this.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 16, 16);
            const texture = new THREE.CanvasTexture(canvas);

            this.material = new THREE.PointsMaterial({
              size: 0.22,
              vertexColors: true,
              transparent: true,
              opacity: 0.9,
              map: texture,
              blending: THREE.NormalBlending
            });
            
            this.particleSystem = new THREE.Points(this.geometry, this.material);
            scene3D.add(this.particleSystem);
          },
          
          tick: function (time, timeDelta) {
            if (!this.particleSystem) return;
            
            const pos = this.geometry.attributes.position.array;
            this.material.size = (Math.sin(time * 0.002) * 0.08) + 0.20;

            for (let i = 0; i < this.count; i++) {
              const i3 = i * 3;
              
              pos[i3] += this.velocities[i3];
              pos[i3 + 1] += this.velocities[i3 + 1];
              pos[i3 + 2] += this.velocities[i3 + 2];
              
              if (Math.abs(pos[i3]) > 25) this.velocities[i3] *= -1;
              if (Math.abs(pos[i3 + 1] - 1.6) > 20) this.velocities[i3 + 1] *= -1;
              if (Math.abs(pos[i3 + 2]) > 25) this.velocities[i3 + 2] *= -1;
            }
            
            this.geometry.attributes.position.needsUpdate = true;
            this.particleSystem.rotation.y += 0.0005;
            this.particleSystem.rotation.x += 0.0002;
          }
        });

        const nombresDestinos = {
            'fuera': 'Exterior\nESAN',
            'entrada': 'Entrada\nPrincipal', 'jardin': 'Jardin', 'fuente': 'Fuente',
            'capilla': 'Capilla', 'fablab': 'FabLab', 'fablab2': 'FabLab 2',
            'voley': 'Cancha de\nVoley', 'basquet': 'Cancha de\nBasquet',
            'explanada': 'Explanada\nConvention', 'eventos': 'Eventos',
            'butacas': 'Butacas', 'biblioteca': 'Biblioteca', 'danza': 'Danza',
            'edificioD': 'Edificio D', 'conducta': 'Lab Conducta', 'edificioA': 'Edificio A',
            'ecoesan': 'EcoESAN', 'aula': 'Aula', 'laboratorio': 'Lab de\nComputo',
            'datalab': 'Data Lab', 'cafeteria': 'Cafeteria', 'cafeteria_interior': 'Cafeteria\nInterior',
            'fisica': 'Lab de\nFisica', 'quimica': 'Lab de\nQuimica',
            'estudio_pregrado': 'Sala Estudio\nPregrado', 'estudio_mba': 'Sala Estudio\nMBA',
            'estudio_magister': 'Sala Estudio\nMagister', 'descanso_magister': 'Sala Descanso\nMagister',
            'robotica': 'Lab\nRobotica'
        };

        AFRAME.registerGeometry('rounded-rect', {
            schema: { width: { default: 1 }, height: { default: 1 }, radius: { default: 0.05 } },
            init: function (data) {
                var shape = new THREE.Shape();
                var w = data.width / 2, h = data.height / 2, r = Math.min(data.radius, w, h);
                shape.moveTo(-w + r, -h);
                shape.lineTo(w - r, -h);
                shape.quadraticCurveTo(w, -h, w, -h + r);
                shape.lineTo(w, h - r);
                shape.quadraticCurveTo(w, h, w - r, h);
                shape.lineTo(-w + r, h);
                shape.quadraticCurveTo(-w, h, -w, h - r);
                shape.lineTo(-w, -h + r);
                shape.quadraticCurveTo(-w, -h, -w + r, -h);
                this.geometry = new THREE.ShapeGeometry(shape, 8);
            }
        });

        AFRAME.registerGeometry('rounded-rect-top', {
            schema: { width: { default: 1 }, height: { default: 1 }, radius: { default: 0.05 } },
            init: function (data) {
                var shape = new THREE.Shape();
                var w = data.width / 2, h = data.height / 2, r = Math.min(data.radius, w, h);
                shape.moveTo(-w, -h);
                shape.lineTo(w, -h);
                shape.lineTo(w, h - r);
                shape.quadraticCurveTo(w, h, w - r, h);
                shape.lineTo(-w + r, h);
                shape.quadraticCurveTo(-w, h, -w, h - r);
                shape.lineTo(-w, -h);
                this.geometry = new THREE.ShapeGeometry(shape, 8);
            }
        });

        AFRAME.registerComponent('rotate-with-camera', {
            init: function () {
                this._camEl = null;
            },
            tick: function () {
                if (!this.el.sceneEl.camera) return;
                if (!this._camEl) this._camEl = document.querySelector('[camera]');
                var camRot = this._camEl && this._camEl.getAttribute('rotation');
                if (camRot) this.el.setAttribute('rotation', { x: 0, y: camRot.y, z: 0 });
            }
        });

        AFRAME.registerComponent('telekinesis-balon', {
            init: function () {
                this.manoActiva = null;
                this.agarrado = false;

                this.el.addEventListener('mousedown', (evt) => {
                    if (this.agarrado) return;
                    this.manoActiva = evt.detail.cursorEl || document.querySelector('#camara-principal');
                    this.agarrado = true;
                    this.el.removeAttribute('dynamic-body');
                });

                this.el.addEventListener('mouseup', () => {
                    if (!this.agarrado) return;
                    this.agarrado = false;
                    this.el.setAttribute('dynamic-body', 'mass: 1; bounce: 0.75');

                    var dir = new THREE.Vector3();
                    this.manoActiva.object3D.getWorldDirection(dir);
                    dir.multiplyScalar(-1);
                    dir.multiplyScalar(12);
                    dir.y += 4;

                    setTimeout(() => {
                        if (this.el.components['dynamic-body']) {
                            this.el.components['dynamic-body'].body.velocity.set(0, 0, 0);
                            this.el.components['dynamic-body'].body.applyImpulse(
                                new CANNON.Vec3(dir.x, dir.y, dir.z),
                                new CANNON.Vec3(0, 0, 0)
                            );
                        }
                    }, 50);
                    this.manoActiva = null;
                });
            },
            tick: function () {
                if (this.agarrado && this.manoActiva) {
                    var posPuntero = new THREE.Vector3();
                    this.manoActiva.object3D.getWorldPosition(posPuntero);
                    var dirPuntero = new THREE.Vector3();
                    this.manoActiva.object3D.getWorldDirection(dirPuntero);
                    dirPuntero.multiplyScalar(-1);
                    posPuntero.add(dirPuntero.multiplyScalar(0.6));
                    this.el.object3D.position.copy(posPuntero);
                }
            }
        });

        AFRAME.registerComponent('sistema-puntos', {
            init: function () {
                this.puntos = 0;
                this.puedeAnotar = true;
                this.pelota = document.querySelector('#pelota-interactiva');
                this.marcador = document.querySelector('#texto-marcador');
                this.posAro = new THREE.Vector3(0, 3.5, -11.5);
            },
            tick: function () {
                if (!this.pelota || !this.puedeAnotar) return;
                var posPelota = this.pelota.object3D.position;
                var distancia = posPelota.distanceTo(this.posAro);

                if (distancia < 0.8) {
                    this.puntos++;
                    this.marcador.setAttribute('value', 'PUNTOS: ' + this.puntos);
                    this.pelota.setAttribute('color', '#00FF00');
                    this.puedeAnotar = false;

                    setTimeout(() => {
                        this.pelota.setAttribute('color', '#D95C14');
                        this.puedeAnotar = true;
                    }, 1500);
                }

                if (posPelota.y < -5 || posPelota.distanceTo(new THREE.Vector3(0, 0, 0)) > 30) {
                    resetearPelota();
                }
            }
        });

        AFRAME.registerComponent('card-style', {
            init: function () {
                var panel = this.el;
                setTimeout(function () {
                    var bgPlane = panel.querySelector('a-plane:not(.close-btn)');
                    if (!bgPlane) return;
                    var w = parseFloat(bgPlane.getAttribute('width') || 4);
                    bgPlane.parentNode.removeChild(bgPlane);

                    var PAD_V = 0.22, GAP = 0.32;

                    function mkPlane(color, width, height, px, py, pz, opacity, transparent) {
                        var p = document.createElement('a-plane');
                        p.setAttribute('color', color);
                        p.setAttribute('width', width);
                        p.setAttribute('height', height);
                        p.setAttribute('position', px + ' ' + py + ' ' + pz);
                        p.setAttribute('opacity', opacity);
                        p.setAttribute('shader', 'flat');
                        if (transparent) p.setAttribute('transparent', 'true');
                        return p;
                    }

                    function mkTroika(value, color, fontSize, maxW) {
                        var e = document.createElement('a-entity');
                        e.setAttribute('troika-text', {
                            value: value, color: color,
                            fontSize: fontSize, maxWidth: maxW,
                            textAlign: 'center', anchorX: 'center', anchorY: 'top'
                        });
                        return e;
                    }

                    function getTxtH(el) {
                        var comp = el.components && el.components['troika-text'];
                        if (!comp || !comp.troikaTextMesh || !comp.troikaTextMesh.textRenderInfo) return null;
                        var bb = comp.troikaTextMesh.textRenderInfo.blockBounds;
                        if (!bb) return null;
                        return Array.isArray(bb) ? Math.abs(bb[3] - bb[1])
                                                 : Math.abs((bb.top || 0) - (bb.bottom || 0));
                    }

                    var texts = Array.from(panel.querySelectorAll('a-text')).filter(function (t) {
                        var par = t.parentElement;
                        while (par && par !== panel) {
                            if (par.classList && par.classList.contains('close-btn')) return false;
                            par = par.parentElement;
                        }
                        return true;
                    });

                    var titleTextValue = texts[0] ? (texts[0].getAttribute('value') || '') : '';
                    var titleEl = null, descEl = null;
                    if (texts[0]) {
                        titleEl = mkTroika(titleTextValue, '#E3173E', 0.22, w - 0.4);
                        panel.appendChild(titleEl);
                        texts[0].parentNode.removeChild(texts[0]);
                    }
                    if (texts[1]) {
                        descEl = mkTroika(texts[1].getAttribute('value') || '', '#555555', 0.185, w - 0.5);
                        panel.appendChild(descEl);
                        texts[1].parentNode.removeChild(texts[1]);
                    }

                    var imgSrc    = panel.getAttribute('data-card-img');
                    var isPremium = panel.getAttribute('data-premium') === 'true';
                    var IMG_H = parseFloat((w / 1.5).toFixed(3)); // 3:2 ratio (fuenteF.webp 5760×3840)
                    var imgEl = null;
                    if (imgSrc) {
                        imgEl = document.createElement('a-plane');
                        imgEl.setAttribute('width', w.toFixed(2));
                        imgEl.setAttribute('height', IMG_H.toFixed(2));
                        imgEl.setAttribute('src', imgSrc);
                        imgEl.setAttribute('shader', 'flat');
                    }

                    var attempts = 0;
                    function build() {
                        var th = titleEl ? getTxtH(titleEl) : 0;
                        var dh = descEl  ? getTxtH(descEl)  : 0;
                        if (attempts++ < 300 && ((titleEl && th === null) || (descEl && dh === null))) {
                            requestAnimationFrame(build); return;
                        }
                        th = th || (titleEl ? 0.34 : 0);
                        dh = dh || (descEl  ? 0.24 : 0);

                        if (isPremium && imgEl) {
                            /* ── PREMIUM CARD (imagen + badge + divider) ── */
                            // IP = padding superior antes de la imagen (muestra esquinas redondeadas del card arriba)
                            var IP = 0.02;
                            var BG = 0.16, BH = 0.21, DG = 0.12, DH = 0.026, TG = 0.14, BP = 0.26;
                            var h   = IP + IMG_H + BG + BH + DG + DH + TG + th + GAP + dh + BP;
                            var topY = h / 2;

                            var imgCY   = topY - IP - IMG_H / 2;
                            var badgeCY = topY - IP - IMG_H - BG - BH / 2;
                            var divCY   = topY - IP - IMG_H - BG - BH - DG - DH / 2;
                            var titlePY = topY - IP - IMG_H - BG - BH - DG - DH - TG;
                            var descPY  = titlePY - th - GAP;

                            // Sombra redondeada
                            var shadowEl = document.createElement('a-entity');
                            shadowEl.setAttribute('geometry', 'primitive: rounded-rect; width: ' + (w+0.28).toFixed(2) + '; height: ' + (h+0.28).toFixed(2) + '; radius: 0.14');
                            shadowEl.setAttribute('material', 'color: #000000; opacity: 0.26; transparent: true');
                            shadowEl.setAttribute('position', '0.09 -0.09 -0.06');
                            panel.appendChild(shadowEl);

                            // Borde/marco rojo (ligeramente más grande que el card)
                            var borderEl = document.createElement('a-entity');
                            borderEl.setAttribute('geometry', 'primitive: rounded-rect; width: ' + (w+0.08).toFixed(2) + '; height: ' + (h+0.08).toFixed(2) + '; radius: 0.14');
                            borderEl.setAttribute('material', 'color: #E3173E; opacity: 1');
                            borderEl.setAttribute('position', '0 0 -0.02');
                            panel.appendChild(borderEl);

                            // Fondo blanco con esquinas redondeadas (cubre TODO el card)
                            var bgEl = document.createElement('a-entity');
                            bgEl.setAttribute('geometry', 'primitive: rounded-rect; width: ' + w.toFixed(2) + '; height: ' + h.toFixed(2) + '; radius: 0.12');
                            bgEl.setAttribute('material', 'color: #FFFFFF; opacity: 1');
                            bgEl.setAttribute('position', '0 0 -0.01');
                            panel.appendChild(bgEl);

                            // Imagen a ancho completo, debajo del margen IP (las esquinas superiores del fondo blanco quedan visibles)
                            imgEl.setAttribute('width', w.toFixed(2));
                            imgEl.setAttribute('height', IMG_H.toFixed(2));
                            imgEl.setAttribute('position', '0 ' + imgCY.toFixed(3) + ' 0.02');
                            panel.appendChild(imgEl);

                            // Badge (fondo rosa claro + texto rojo)
                            var bW = Math.min(titleTextValue.length * 0.092 + 0.30, 2.8);
                            var bX = (-w / 2 + bW / 2 + 0.22).toFixed(3);
                            var bY = badgeCY.toFixed(3);
                            var badge = document.createElement('a-entity');
                            badge.setAttribute('geometry', 'primitive: rounded-rect; width:' + bW.toFixed(2) + '; height:' + BH.toFixed(2) + '; radius:0.07');
                            badge.setAttribute('material', 'color: #fde8ec; opacity: 1');
                            badge.setAttribute('position', bX + ' ' + bY + ' 0.02');
                            panel.appendChild(badge);

                            var badgeTxt = document.createElement('a-entity');
                            badgeTxt.setAttribute('troika-text', {
                                value: titleTextValue, color: '#E3173E',
                                fontSize: 0.088, maxWidth: bW - 0.12,
                                textAlign: 'center', anchorX: 'center', anchorY: 'middle',
                                fontWeight: 'bold', letterSpacing: 0.06
                            });
                            badgeTxt.setAttribute('position', bX + ' ' + bY + ' 0.04');
                            panel.appendChild(badgeTxt);

                            // Línea divisora roja (izquierda → derecha degradando)
                            panel.appendChild(mkPlane('#E3173E', (w - 0.44).toFixed(2), DH.toFixed(3),
                                (-0.22).toFixed(2), divCY.toFixed(3), '0.02', '1', false));

                            // Textos
                            if (titleEl) titleEl.setAttribute('position', '0 ' + titlePY.toFixed(3) + ' 0.06');
                            if (descEl)  descEl.setAttribute('position',  '0 ' + descPY.toFixed(3)  + ' 0.06');

                            // Botón cerrar (gris oscuro sobre la imagen)
                            var closeBtn = panel.querySelector('.close-btn');
                            if (closeBtn) {
                                closeBtn.setAttribute('position', (w/2 - 0.22).toFixed(2) + ' ' + (topY - 0.22).toFixed(2) + ' 0.05');
                                closeBtn.setAttribute('color', '#3a3a3a');
                                closeBtn.setAttribute('opacity', '0.82');
                                closeBtn.setAttribute('width', '0.32');
                                closeBtn.setAttribute('height', '0.32');
                                var cbTxt = closeBtn.querySelector('a-text');
                                if (cbTxt) { cbTxt.setAttribute('color', '#FFFFFF'); cbTxt.setAttribute('width', '5'); }
                            }

                        } else {
                            /* ── CARD ESTÁNDAR ── */
                            var imgOffset = imgEl ? IMG_H : 0;
                            var contentH  = th + (dh > 0 ? GAP + dh : 0);
                            var h = imgOffset + contentH + PAD_V * 2;
                            var titleY = h / 2 - imgOffset - PAD_V;

                            if (titleEl) titleEl.setAttribute('position', '0 ' + titleY.toFixed(3) + ' 0.06');
                            if (descEl)  descEl.setAttribute('position',  '0 ' + (titleY - th - GAP).toFixed(3) + ' 0.06');

                            panel.appendChild(mkPlane('#000000', (w+0.30).toFixed(2), (h+0.30).toFixed(2), '0.10','-0.10','-0.05','0.30',true));
                            panel.appendChild(mkPlane('#E3173E', (w+0.16).toFixed(2), (h+0.16).toFixed(2), '0','0','-0.02','1',false));
                            panel.appendChild(mkPlane('#FFFFFF', w, h.toFixed(2), '0','0','-0.01','1',false));

                            if (imgEl) {
                                imgEl.setAttribute('position', '0 ' + (h / 2 - IMG_H / 2).toFixed(3) + ' 0.03');
                                panel.appendChild(imgEl);
                            }

                            var closeBtn = panel.querySelector('.close-btn');
                            if (closeBtn) closeBtn.setAttribute('position',
                                (w/2+0.10).toFixed(2) + ' ' + (h/2+0.10).toFixed(2) + ' 0.04');
                        }
                    }
                    requestAnimationFrame(build);
                }, 0);
            }
        });

        function iniciarTransicion(nombreEscena, direccionDeseada) {
            var datos = escenas[nombreEscena];
            if (datos && datos.imagen && !datos.imagen.startsWith('#') && !_preCache[datos.imagen]) {
                _preCache[datos.imagen] = true;
                var _warmImg = new Image();
                _warmImg.src = datos.imagen;
            }
            var contenedorFlechas = document.querySelector('#flechas-container');
            var cieloFondo = document.querySelector('#cielo-fondo');
            var overlayFade = document.querySelector('#overlay-fade');
            var btnLanzarMinijuego = document.querySelector('#btn-lanzar-minijuego');
            var fondoOscuro = document.querySelector('#hotspot-darkbg');
            var duracionFade = 300;

            contenedorFlechas.setAttribute('visible', 'false');
            btnLanzarMinijuego.setAttribute('visible', 'false');
            btnLanzarMinijuego.classList.remove('clickable');

            if (fondoOscuro) fondoOscuro.setAttribute('visible', 'false');

            var todosHotspots = document.querySelectorAll('.grupo-hotspots');
            todosHotspots.forEach(function (grupo) {
                grupo.setAttribute('visible', 'false');
                var paneles = grupo.querySelectorAll('.panel-activo');
                paneles.forEach(p => {
                    p.setAttribute('visible', 'false');
                    p.classList.remove('panel-activo');
                });
                var iconos = grupo.querySelectorAll('.icono-hotspot');
                iconos.forEach(i => i.classList.remove('clickable'));
            });

            overlayFade.setAttribute('animation', { property: 'material.opacity', from: 0, to: 1, dur: duracionFade, easing: 'linear' });

            setTimeout(() => {
                cieloFondo.setAttribute('src', datos.imagen);
                cieloFondo.setAttribute('rotation', datos.rotacionSky || "0 -90 0");
                generarFlechas(datos.flechas);

                var rig = document.querySelector('#rig');
                rig.setAttribute('rotation', direccionDeseada || "0 0 0");

                var camara = document.querySelector('#camara-principal');
                var lookControls = camara.components['look-controls'];
                if (lookControls) {
                    lookControls.pitchObject.rotation.x = 0;
                    lookControls.yawObject.rotation.y = 0;
                }

                var _revealed = false;
                var _revealTimeout;

                function revelarEscena() {
                    if (_revealed) return;
                    _revealed = true;
                    clearTimeout(_revealTimeout);
                    cieloFondo.removeEventListener('materialtextureloaded', revelarEscena);
                    contenedorFlechas.setAttribute('visible', 'true');

                    if (nombreEscena === 'basquet') {
                        btnLanzarMinijuego.setAttribute('visible', 'true');
                        btnLanzarMinijuego.classList.add('clickable');
                    }

                    var hotspotActual = document.querySelector('#hotspots-' + nombreEscena);
                    if (hotspotActual) {
                        hotspotActual.setAttribute('visible', 'true');
                        var iconos = hotspotActual.querySelectorAll('.icono-hotspot');
                        iconos.forEach(i => i.classList.add('clickable'));
                    }

                    overlayFade.setAttribute('animation', { property: 'material.opacity', from: 1, to: 0, dur: duracionFade, easing: 'linear' });
                    precargarAdyacentes(nombreEscena);
                }

                cieloFondo.addEventListener('materialtextureloaded', revelarEscena);
                _revealTimeout = setTimeout(revelarEscena, 1000);
            }, duracionFade + 50);
        }

        function resetearPelota() {
            var pelota = document.querySelector('#pelota-interactiva');
            if (pelota) {
                pelota.components['telekinesis-balon'].agarrado = false;
                if (!pelota.getAttribute('dynamic-body')) {
                    pelota.setAttribute('dynamic-body', 'mass: 1; bounce: 0.75');
                }
                setTimeout(() => {
                    if (pelota.components['dynamic-body']) {
                        pelota.components['dynamic-body'].body.velocity.set(0, 0, 0);
                        pelota.components['dynamic-body'].body.angularVelocity.set(0, 0, 0);
                        pelota.components['dynamic-body'].body.position.set(0, 1.2, -2);
                    }
                }, 50);
            }
        }

        function activarMinijuego() {
            document.querySelector('#flechas-container').setAttribute('visible', 'false');
            document.querySelector('#btn-lanzar-minijuego').setAttribute('visible', 'false');
            document.querySelector('#btn-lanzar-minijuego').classList.remove('clickable');

            var scene = document.querySelector('a-scene');
            if (!scene.hasAttribute('physics')) {
                scene.setAttribute('physics', 'debug: false; gravity: -9.8');
            }

            document.querySelector('#entorno-fisicas-basquet').setAttribute('visible', 'true');

            var btnVolver = document.querySelector('#btn-volver-tour');
            btnVolver.classList.add('clickable');
            var btnReset = document.querySelector('#btn-reset-balon');
            btnReset.classList.add('clickable');

            resetearPelota();
        }

        function flowchart_step() { return; }

        function desactivarMinijuego() {
            document.querySelector('#entorno-fisicas-basquet').setAttribute('visible', 'false');
            document.querySelector('#btn-volver-tour').classList.remove('clickable');
            document.querySelector('#btn-reset-balon').classList.remove('clickable');

            document.querySelector('#flechas-container').setAttribute('visible', 'true');

            var btnLanzarMinijuego = document.querySelector('#btn-lanzar-minijuego');
            btnLanzarMinijuego.setAttribute('visible', 'true');
            btnLanzarMinijuego.classList.add('clickable');
        }

        function generarFlechas(listaFlechas) {
            var contenedor = document.querySelector('#flechas-container');
            contenedor.innerHTML = '';
            listaFlechas.forEach(flecha => {

                var wrapper = document.createElement('a-entity');
                wrapper.setAttribute('position', flecha.position);
                wrapper.setAttribute('animation__float', `property: position; dir: alternate; dur: 2200; easing: easeInOutSine; loop: true; to: ${flecha.position.split(' ')[0]} ${(parseFloat(flecha.position.split(' ')[1]) + 0.22).toFixed(2)} ${flecha.position.split(' ')[2]}`);
                wrapper.setAttribute('animation__pulse', 'property: scale; from: 0.88 0.88 0.88; to: 1.22 1.22 1.22; dir: alternate; dur: 1600; easing: easeInOutSine; loop: true');

                var entidad = document.createElement('a-image');
                entidad.setAttribute('src', flecha.imgSrc || '#img-flecha-plana');
                entidad.setAttribute('scale', '1.8 1.8 1.8');
                entidad.setAttribute('look-at', '[camera]');
                entidad.setAttribute('transparent', 'true');

                entidad.setAttribute('data-target', flecha.target);
                entidad.setAttribute('class', 'clickable');
                if (flecha.mirarAlLlegar) {
                    entidad.setAttribute('data-mirar', flecha.mirarAlLlegar);
                }
                entidad.setAttribute('tour-logic', '');

                (function (target) {
                    entidad.addEventListener('mouseenter', function () {
                        var dest = escenas[target];
                        if (dest && dest.imagen && !dest.imagen.startsWith('#') && !_preCache[dest.imagen]) {
                            _preCache[dest.imagen] = true;
                            var img = new Image(); img.src = dest.imagen;
                        }
                    });
                })(flecha.target);

                var nombreLugar = flecha.label || nombresDestinos[flecha.target] || flecha.target;
                var lineas = nombreLugar.split('\n');
                var maxLen = Math.max(...lineas.map(l => l.length));
                var cardWidth = Math.max(maxLen * 0.13 + 0.4, 1.0);
                var cardHeight = lineas.length > 1 ? 0.80 : 0.58;

                var etiqueta = document.createElement('a-entity');
                etiqueta.classList.add('etiqueta-flotante');
                etiqueta.setAttribute('position', '0 1.2 0.05');
                etiqueta.setAttribute('scale', '0.9 0.9 0.9');
                etiqueta.setAttribute('visible', 'false');

                var fondo = document.createElement('a-entity');
                fondo.setAttribute('geometry', `primitive: rounded-rect; width: ${cardWidth.toFixed(2)}; height: ${cardHeight}; radius: 0.08`);
                fondo.setAttribute('material', 'color: #E3173E; opacity: 0.95');
                fondo.setAttribute('position', '0 0 -0.01');
                etiqueta.appendChild(fondo);

                var texto = document.createElement('a-text');
                texto.setAttribute('value', nombreLugar);
                texto.setAttribute('align', 'center');
                texto.setAttribute('color', '#FFFFFF');
                texto.setAttribute('font', 'exo2semibold');
                texto.setAttribute('width', (cardWidth * 0.88).toFixed(2));
                texto.setAttribute('wrap-count', String(maxLen));
                texto.setAttribute('position', '0 0 0.01');
                etiqueta.appendChild(texto);

                entidad.appendChild(etiqueta);
                wrapper.appendChild(entidad);
                contenedor.appendChild(wrapper);
            });
        }

        function construirMenu3D() {
            var menu = document.querySelector('#menu-3d');
            var keys = Object.keys(nombresDestinos);

            var panelFondo = document.createElement('a-entity');
            panelFondo.setAttribute('geometry', 'primitive: rounded-rect; width: 4.0; height: 3.6; radius: 0.15');
            panelFondo.setAttribute('material', 'color: #000000; opacity: 0.72');
            panelFondo.setAttribute('position', '0 0.10 -0.05');
            menu.appendChild(panelFondo);

            var titulo = document.createElement('a-text');
            titulo.setAttribute('value', 'MAPA VIRTUAL ESAN');
            titulo.setAttribute('align', 'center');
            titulo.setAttribute('color', '#FFFFFF');
            titulo.setAttribute('font', 'exo2semibold');
            titulo.setAttribute('position', '0 1.55 0');
            titulo.setAttribute('width', '4.5');
            menu.appendChild(titulo);

            let cols = 5;
            let startX = -1.60; let startY = 1.1; let gapX = 0.80; let gapY = 0.40;

            keys.forEach((key, index) => {
                let col = index % cols; let row = Math.floor(index / cols);
                let posX = startX + (col * gapX); let posY = startY - (row * gapY);

                var btn = document.createElement('a-entity');
                btn.setAttribute('geometry', 'primitive: rounded-rect; width: 0.72; height: 0.3; radius: 0.06');
                btn.setAttribute('material', 'color: #E3173E; opacity: 0.95');
                btn.setAttribute('position', `${posX} ${posY} 0`);
                btn.setAttribute('class', 'menu-btn'); btn.setAttribute('data-target', key);
                btn.setAttribute('menu-interactivo', '');

                var txt = document.createElement('a-text');
                txt.setAttribute('value', nombresDestinos[key]);
                txt.setAttribute('align', 'center'); txt.setAttribute('color', '#FFFFFF');
                txt.setAttribute('font', 'exo2semibold');
                txt.setAttribute('width', '0.70'); txt.setAttribute('wrap-count', '12');
                txt.setAttribute('position', '0 0 0.02');
                btn.appendChild(txt);
                menu.appendChild(btn);
            });

            var btnEnlace = document.createElement('a-entity');
            btnEnlace.setAttribute('geometry', 'primitive: rounded-rect; width: 2.6; height: 0.32; radius: 0.07');
            btnEnlace.setAttribute('material', 'color: #FFFFFF; opacity: 0.95');
            btnEnlace.setAttribute('position', '0 -1.25 0'); btnEnlace.setAttribute('class', 'menu-btn');

            var btnFill = document.createElement('a-entity');
            btnFill.setAttribute('geometry', 'primitive: rounded-rect; width: 2.50; height: 0.22; radius: 0.06');
            btnFill.setAttribute('material', 'color: #222222; opacity: 0.95');
            btnFill.setAttribute('position', '0 0 0.002');
            btnEnlace.appendChild(btnFill);

            var txtEnlace = document.createElement('a-text');
            txtEnlace.setAttribute('value', 'Ver trayectoria historica');
            txtEnlace.setAttribute('align', 'center'); txtEnlace.setAttribute('color', '#FFFFFF');
            txtEnlace.setAttribute('font', 'exo2semibold');
            txtEnlace.setAttribute('width', '2.5'); txtEnlace.setAttribute('wrap-count', '35');
            txtEnlace.setAttribute('position', '0 0 0.005');
            btnEnlace.appendChild(txtEnlace);

            btnEnlace.addEventListener('click', function () { window.location.href = 'https://esanlabs.github.io/Doble-videos-Esan/'; });

            btnEnlace.addEventListener('mouseenter', function () {
                btnFill.setAttribute('material', 'color: #E3173E; opacity: 0.95');
                btnEnlace.setAttribute('scale', '1.05 1.05 1.05');
            });

            btnEnlace.addEventListener('mouseleave', function () {
                btnFill.setAttribute('material', 'color: #222222; opacity: 0.95');
                btnEnlace.setAttribute('scale', '1 1 1');
            });

            menu.appendChild(btnEnlace);
        }

        var _menuBuilt = false;
        function toggleMenu3D() {
            if (!_menuBuilt) {
                construirMenu3D();
                _menuBuilt = true;
            }
            var menu = document.querySelector('#menu-3d');
            var cam = document.querySelector('#camara-principal');
            var btn2D = document.getElementById('btn-menu-2d');
            var isVisible = menu.getAttribute('visible');

            if (!isVisible) {
                var cam3D = cam.getObject3D('camera');
                if (cam3D) {
                    var posCamara = new THREE.Vector3();
                    cam3D.getWorldPosition(posCamara);
                    var vectorDireccion = new THREE.Vector3();
                    cam3D.getWorldDirection(vectorDireccion);
                    vectorDireccion.multiplyScalar(4.5);
                    var nuevaPosicion = posCamara.clone().add(vectorDireccion);
                    menu.setAttribute('position', nuevaPosicion);
                    menu.setAttribute('look-at', '[camera]');
                }
                menu.setAttribute('visible', 'true');
                if (btn2D) btn2D.innerText = 'Cerrar Menu de Navegacion';
                var botonesMenu = menu.querySelectorAll('.menu-btn');
                botonesMenu.forEach(b => b.classList.add('clickable'));
            } else {
                menu.setAttribute('visible', 'false');
                if (btn2D) btn2D.innerText = 'Abrir Menu de Navegacion';
                var botonesMenu = menu.querySelectorAll('.menu-btn');
                botonesMenu.forEach(b => b.classList.remove('clickable'));
            }
        }

        window.onload = function () {
            var datos = escenas['fuera'];
            var cieloFondo = document.querySelector('#cielo-fondo');

            function revelarInicio() {
                ocultarLoader();
                precargarAdyacentes('fuera');
                var hotspotEntrada = document.querySelector('#hotspots-fuera');
                if (hotspotEntrada) {
                    hotspotEntrada.setAttribute('visible', 'true');
                    hotspotEntrada.querySelectorAll('.icono-hotspot').forEach(i => i.classList.add('clickable'));
                }
            }

            cieloFondo.setAttribute('src', datos.imagen);
            cieloFondo.setAttribute('rotation', datos.rotacionSky || '0 -90 0');
            generarFlechas(datos.flechas);

            cieloFondo.addEventListener('materialtextureloaded', function onFirstTexture() {
                cieloFondo.removeEventListener('materialtextureloaded', onFirstTexture);
                revelarInicio();
                setTimeout(aplicarMarcosPaneles, 200);
            });

            setTimeout(function () {
                revelarInicio();
                setTimeout(aplicarMarcosPaneles, 200);
            }, 1500);

            document.getElementById('btn-menu-2d').addEventListener('click', toggleMenu3D);
            document.querySelector('#btn-lanzar-minijuego').addEventListener('click', activarMinijuego);
            document.querySelector('#btn-volver-tour').addEventListener('click', desactivarMinijuego);
            document.querySelector('#btn-reset-balon').addEventListener('click', resetearPelota);

            var darkbg = document.querySelector('#hotspot-darkbg');
            if (darkbg) {
                darkbg.addEventListener('click', function () {
                    var panelActivo = document.querySelector('.panel-activo');
                    if (panelActivo) {
                        panelActivo.setAttribute('visible', 'false');
                        panelActivo.classList.remove('panel-activo');
                    }
                    darkbg.setAttribute('visible', 'false');
                    var flechas = document.querySelector('#flechas-container');
                    if (flechas) flechas.setAttribute('visible', 'true');
                });
            }

            document.getElementById('btn-capturar').addEventListener('click', function () {
                var cam = document.querySelector('#camara-principal').getObject3D('camera');
                if (!cam) return;

                var vectorDireccion = new THREE.Vector3();
                cam.getWorldDirection(vectorDireccion);

                var distancia = 12;

                var posX = (vectorDireccion.x * distancia).toFixed(2);
                var posY = (vectorDireccion.y * distancia).toFixed(2);
                var posZ = (vectorDireccion.z * distancia).toFixed(2);

                var anguloRad = Math.atan2(vectorDireccion.x, vectorDireccion.z);
                var rotY = Math.round(anguloRad * (180 / Math.PI));

                var codigoGenerado = `{ target: 'DESTINO', position: '${posX} ${posY} ${posZ}', rotation: '0 ${rotY} 0' },`;

                navigator.clipboard.writeText(codigoGenerado).then(function () {
                    alert("¡Cartel capturado en tu portapapeles!\n\n" + codigoGenerado + "\n\nPegalo en tu código.");
                }).catch(function () {
                    prompt("Copia este código:", codigoGenerado);
                });
                console.log("%c NUEVA COORDENADA CAPTURADA", "color: #E3173E; font-size: 16px; font-weight: bold;");
                console.log(codigoGenerado);
            });

            document.getElementById('ic-close-btn').addEventListener('click', hideCard2D);
            document.getElementById('card-backdrop').addEventListener('click', hideCard2D);
        };

        var _marcosAplicados = false;
        function aplicarMarcosPaneles() {
            return; 
        }

        var _loaderOculto = false;
        function ocultarLoader() {
            if (_loaderOculto) return;
            _loaderOculto = true;
            var loader = document.getElementById('pantalla-carga');
            if (loader) {
                loader.classList.add('oculto');
                setTimeout(() => {
                    loader.style.display = 'none';
                    window.dispatchEvent(new Event('resize'));
                }, 1000);
            }
        }

        const _preCache = {};
        function precargarAdyacentes(nombreEscena) {
            var datos = escenas[nombreEscena];
            if (!datos || !datos.flechas) return;
            datos.flechas.forEach(function (flecha) {
                var destino = escenas[flecha.target];
                if (!destino) return;
                var src = destino.imagen;
                if (!src || src.startsWith('#') || _preCache[src]) return;
                _preCache[src] = true;
                var img = new Image();
                img.src = src;
            });
        }

        /* ── Datos para las 2D info cards ── */
        window.cardData2D = {
            'panel-info-entrada': {
                title: 'ENTRADA PRINCIPAL ESAN',
                desc: 'Bienvenidos a una de las instituciones de educación superior en negocios más prestigiosas de América Latina.',
                image: 'imagenes/entrada esan.jpg',
                scene: 'ENTRADA PRINCIPAL'
            },
            'panel-info-fuera': {
                title: 'EXTERIOR ESAN',
                desc: 'Amplias áreas verdes y zonas de tránsito que destacan nuestra moderna arquitectura.',
                image: 'imagenes/Fotos/fuenteF.webp',
                scene: 'EXTERIOR ESAN'
            }
        };

        function showCard2D(title, desc, imageSrc, sceneTag) {
            document.getElementById('ic-title').textContent = title;
            document.getElementById('ic-desc').textContent = desc;
            document.getElementById('ic-scene-tag').textContent = (sceneTag || 'ESAN').toUpperCase();
            var img = document.getElementById('ic-img');
            if (imageSrc) {
                img.src = imageSrc;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
            document.getElementById('info-card-2d').classList.add('visible');
            document.getElementById('card-backdrop').classList.add('visible');
        }

        function hideCard2D() {
            document.getElementById('info-card-2d').classList.remove('visible');
            document.getElementById('card-backdrop').classList.remove('visible');
        }

        AFRAME.registerComponent('card-2d-trigger', {
            schema: { panel: { type: 'string' } },
            init: function () {
                var panelId = this.data.panel.replace(/^#/, '');
                var el = this.el;
                el.addEventListener('click', function () {
                    if (_isDragging) return;
                    var data = window.cardData2D[panelId];
                    if (data) showCard2D(data.title, data.desc, data.image, data.scene);
                });
                el.addEventListener('mouseenter', function () {
                    el.setAttribute('scale', '0.9 0.9 0.9');
                });
                el.addEventListener('mouseleave', function () {
                    el.setAttribute('scale', '0.8 0.8 0.8');
                });
            }
        });
    </script>
</head>

<body>

            <canvas id="img-info-icon" width="128" height="128"></canvas>
            <canvas id="img-flecha-derecha" width="128" height="128"></canvas>
            <canvas id="img-flecha-abajo" width="128" height="128"></canvas>
            <canvas id="img-flecha-izquierda" width="128" height="128"></canvas>
        </a-assets>

        <script>
        (function () {
            var S = 128;

            function dibujarInfo(ctx) {
                ctx.fillStyle = '#FF0000';
                ctx.beginPath(); ctx.arc(64, 64, 58, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 72px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('i', 64, 68);
            }

            function dibujarFlecha(ctx, rot) {
                ctx.save();
                ctx.translate(S / 2, S / 2);
                ctx.rotate(rot * Math.PI / 180);
                ctx.translate(-S / 2, -S / 2);
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 34;
                ctx.beginPath(); ctx.moveTo(19, 76); ctx.lineTo(50, 28); ctx.lineTo(81, 76); ctx.stroke();
                ctx.strokeStyle = '#E3173E'; ctx.lineWidth = 26;
                ctx.beginPath(); ctx.moveTo(17, 74); ctx.lineTo(50, 28); ctx.lineTo(83, 74); ctx.stroke();
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 14;
                ctx.beginPath(); ctx.moveTo(17, 74); ctx.lineTo(50, 28); ctx.lineTo(83, 74); ctx.stroke();
                ctx.restore();
            }

            [
                ['img-info-icon',      function (c) { dibujarInfo(c); }],
                ['img-flecha-plana',   function (c) { dibujarFlecha(c, 0); }],
                ['img-flecha-derecha', function (c) { dibujarFlecha(c, 90); }],
                ['img-flecha-abajo',   function (c) { dibujarFlecha(c, 180); }],
                ['img-flecha-izquierda', function (c) { dibujarFlecha(c, -90); }]
            ].forEach(function (d) {
                var el = document.getElementById(d[0]);
                if (!el) return;
                var ctx = el.getContext('2d');
                ctx.clearRect(0, 0, S, S);
                d[1](ctx);
            });
        })();
        </script>

                <a-plane color="#FFFFFF" opacity="0.95" width="4" height="1.6" position="0 0 0"></a-plane>

                <a-text value="RECEPCIÓN" color="#E3173E" align="center" width="7" position="0 1.25 0.01"></a-text>

                <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.75 1.3 0.02"
                    hotspot-info="target: #panel-info-RECEPCION-entrada; action: close">
                    <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>
                </a-plane>
            </a-entity> -->


            <a-image src="#img-info-icon" position="-6.53 2 10.07" scale="0.8 0.8 0.8" look-at="[camera]"
                class="clickable icono-hotspot"
                hotspot-info="target: #panel-info-espera-transporte-entrada; action: toggle">
            </a-image>

            <a-entity id="panel-info-espera-transporte-entrada" visible="false" smooth-follow card-style scale="1 1 1" data-card-img="imagenes/Fotos/fuenteF.webp" data-premium="true">

                <a-text value="ZONA DE ESPERA" color="#E3173E" align="center" width="7" position="0 1.25 0.01"></a-text>

                <a-text
                    value="Espacio práctico, ordenado y seguro para coordinar tu transporte al entrar o salir."
                    color="#333333" align="center" width="3.5" position="0 -0.15 0.01" wrap-count="35"></a-text>

                <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.75 1.3 0.02"
                    hotspot-info="target: #panel-info-espera-transporte-entrada; action: close">
                    <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>
                </a-plane>

        <a-entity id="hotspots-jardin" class="grupo-hotspots" visible="false">
            <a-image src="#img-info-icon" position="11.99 3 -0.20" scale="0.8 0.8 0.8" look-at="[camera]"
                class="clickable icono-hotspot" hotspot-info="target: #panel-info-jardin; action: toggle">
            </a-image>

    <div id="dbg-panel">
        <div>Yaw (Y): <span id="dbg-y">0</span>°</div>
        <div>Pitch (X): <span id="dbg-x">0</span>°</div>
        <div style="border-top:1px solid #00FF8855;margin:4px 0"></div>
        <div>Click → <span id="dbg-pos">—</span></div>
    </div>
    <div id="dbg-btn" onclick="dbgToggle()">📐 Coords</div>

    <script>
        var dbgOn = false, dbgRaf = null;
        function dbgToggle() {
            dbgOn = !dbgOn;
            document.getElementById('dbg-panel').classList.toggle('on', dbgOn);
            document.getElementById('dbg-btn').style.background = dbgOn ? 'rgba(0,150,60,0.9)' : 'rgba(0,0,0,0.75)';
            if (dbgOn) {
                dbgRaf = requestAnimationFrame(dbgTick);
                document.querySelector('a-scene').addEventListener('click', dbgClick);
            } else {
                cancelAnimationFrame(dbgRaf);
                document.querySelector('a-scene').removeEventListener('click', dbgClick);
            }
        }
        function dbgTick() {
            var cam = document.getElementById('camara-principal');
            if (cam) {
                var r = cam.getAttribute('rotation');
                document.getElementById('dbg-y').textContent = r.y.toFixed(2);
                document.getElementById('dbg-x').textContent = r.x.toFixed(2);
            }
            dbgRaf = requestAnimationFrame(dbgTick);
        }
        function dbgClick(e) {
            var pt = e.detail && e.detail.intersection && e.detail.intersection.point;
            if (!pt) return;
            // Normaliza a dist=12 en XZ, Y fijo a 2 (altura ideal de flecha)
            var dist = 12;
            var mag = Math.sqrt(pt.x * pt.x + pt.z * pt.z) || 1;
            var nx = (pt.x / mag * dist).toFixed(2);
            var nz = (pt.z / mag * dist).toFixed(2);
            var txt = nx + ' 2 ' + nz;
            var full = "{ target: 'DESTINO', position: '" + txt + "', rotation: '0 0 0' },";
            document.getElementById('dbg-pos').textContent = txt;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(full).then(function () {
                    dbgToast('Copiado: ' + full);
                }).catch(function () { prompt('Copia esto:', full); });
            } else {
                prompt('Copia esto:', full);
            }
        }
        function dbgToast(msg) {
            var t = document.getElementById('dbg-toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'dbg-toast';
                t.style.cssText = 'position:fixed;bottom:60px;right:12px;background:#00AA44;color:#fff;font-family:monospace;font-size:12px;padding:7px 12px;border-radius:6px;z-index:9999;pointer-events:none;';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.display = 'block';
            clearTimeout(t._to);
            t._to = setTimeout(function () { t.style.display = 'none'; }, 2500);
        }
    </script>
